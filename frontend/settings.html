<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIGStats Settings</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="stylesheet" href="./dialog.css">
<style>
/* ── Settings-specific layout ───────────────────────────────────────────── */
.content {
  padding: 10px;
  display: flex;
  gap: 8px;
  flex: 1;
  min-height: 0;
}
.col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
}

/* Range slider */
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  cursor: pointer;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
.slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.slider-val {
  font-size: 12px;
  color: var(--text);
  width: 34px;
  text-align: right;
  flex-shrink: 0;
}
.slider-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
  font-size: 10px;
  color: var(--text-3);
}

/* Alert grid */
.alert-grid {
  display: grid;
  grid-template-columns: 1fr 48px 48px;
  align-items: center;
  gap: 4px 5px;
}
.alert-col-header {
  font-size: 10px;
  font-weight: 600;
  text-align: center;
  padding-bottom: 1px;
}
.alert-col-header.warn { color: var(--warn); }
.alert-col-header.crit { color: var(--bad); }
.alert-row-label {
  font-size: 12px;
  color: var(--text);
}
input[type=number].alert-num {
  width: 48px;
  font-family: var(--mono);
  padding: 4px 4px;
}

/* Panel drag-and-drop list */
.panels-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.panel-list {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow-y: auto;
  min-height: 0;
}
.panel-item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 5px 8px;
  user-select: none;
  transition: border-color 0.12s, background 0.12s, margin-top 0.2s ease;
}
.panel-item:not(.dragging):hover { border-color: var(--border-hi); }
.panel-item.drag-over {
  border-color: var(--accent);
  background: rgba(96,205,255,0.06);
  margin-top: 16px;
}
.panel-item.dragging { visibility: hidden; }
.panel-drag-handle {
  cursor: grab;
  color: var(--text-3);
  font-size: 14px;
  line-height: 1;
  flex-shrink: 0;
  touch-action: none;
  padding: 0 2px;
}
.panel-drag-handle:active { cursor: grabbing; }
.panel-item-label {
  flex: 1;
  font-size: 12px;
}
.panel-item.hidden-panel .panel-item-label { color: var(--text-2); }

.floating-scale-row {
  display: none;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 8px 10px;
}

.floating-scale-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

/* Status bar (class names must match setStatus() in settings.js) */
.status {
  font-size: 11px;
  color: var(--text-2);
  min-height: 14px;
  padding: 2px 1px;
  flex-shrink: 0;
}
.status-ok  { color: var(--good); }
.status-err { color: var(--bad); }
</style>
</head>
<body>
<div class="shell">
  <div class="hero">
    <div class="dialog-title">Settings</div>
    <div class="dialog-subtitle">Dashboard preferences and window behavior.</div>
  </div>

  <div class="content">

    <!-- Left column: model name, display/window, temperature alerts -->
    <div class="col">
      <div class="card" id="modelNameCard">
        <div class="section-label">Model Name</div>
        <input type="text" id="modelNameInput" maxlength="40" spellcheck="false" style="width:100%;">
      </div>

      <div class="card" id="displayWindowCard">
        <div class="section-label">Display &amp; Window</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <select id="profileSelect">
            <option value="portrait-xl">Portrait XL (450×1920)</option>
            <option value="portrait-slim">Portrait Slim (480×1920)</option>
            <option value="portrait-fhd-side">FHD Sidebar (253×1080)</option>
            <option value="portrait-qhd-side">QHD Sidebar (338×1440)</option>
            <option value="portrait-4k-side">4K Sidebar (506×2160)</option>
            <option value="portrait-hd">Portrait HD (720×1280)</option>
            <option value="portrait-wxga">Portrait WXGA (800×1280)</option>
            <option value="portrait-fhd">Portrait FHD (1080×1920)</option>
            <option value="portrait-wuxga">Portrait WUXGA (1200×1920)</option>
            <option value="portrait-qhd">Portrait QHD (1440×2560)</option>
            <option value="portrait-hdplus">Portrait HD+ (768×1366)</option>
            <option value="portrait-900x1600">Portrait 900×1600</option>
            <option value="portrait-1050x1680">Portrait 1050×1680</option>
            <option value="portrait-1600x2560">Portrait 1600×2560</option>
            <option value="portrait-4k">Portrait 4K (2160×3840)</option>
          </select>
          <label class="toggle-row" for="alwaysOnTopInput">
            <span class="toggle-label">Always On Top</span>
            <input class="toggle-input" type="checkbox" id="alwaysOnTopInput">
          </label>
          <label class="toggle-row" for="autostartInput">
            <div>
              <div class="toggle-label">Launch at Startup</div>
              <div class="toggle-sublabel">Starts at login · LHM connects automatically</div>
            </div>
            <input class="toggle-input" type="checkbox" id="autostartInput">
          </label>
          <label class="toggle-row" for="floatingModeInput">
            <div>
              <div class="toggle-label">Floating Mode</div>
              <div class="toggle-sublabel">Each panel opens as a separate frameless window</div>
            </div>
            <input class="toggle-input" type="checkbox" id="floatingModeInput">
          </label>
          <div id="floatingScaleRow" class="floating-scale-row">
            <div class="floating-scale-head">
              <span style="font-size:12px;color:var(--text-2);">Panel Scale</span>
              <span class="slider-val" id="floatingScaleVal">100%</span>
            </div>
            <div class="slider-row">
              <input type="range" id="floatingScaleSlider" min="40" max="100" value="100" step="5">
            </div>
            <div class="slider-labels">
              <span>40%</span>
              <span>100%</span>
            </div>

          </div>
        </div>
      </div>

      <div class="card" id="alertsCard" style="flex:1;display:flex;flex-direction:column;">
        <div class="section-label">Temperature Alerts</div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <span style="font-size:12px;color:var(--text-2);">Cooldown</span>
          <input type="number" id="alertCooldownInput" min="60" max="3600" step="30" style="width:60px;">
          <span style="font-size:11px;color:var(--text-2);">s</span>
          <button id="btnTestAlert" style="margin-left:auto;">Test Alert</button>
        </div>
        <div class="alert-grid">
          <div style="font-size:11px;color:var(--text-2);">°C — blank to disable</div>
          <div class="alert-col-header warn">Warn</div>
          <div class="alert-col-header crit">Crit</div>

          <div class="alert-row-label" style="color:var(--text-2);">Notify</div>
          <input type="checkbox" id="notifyOnWarnInput" checked class="toggle-input" style="justify-self:center;">
          <input type="checkbox" id="notifyOnCritInput" checked class="toggle-input" style="justify-self:center;">

          <div class="alert-row-label">CPU</div>
          <input type="number" class="alert-num" id="warnCpuTempInput" min="1" max="255" placeholder="—">
          <input type="number" class="alert-num" id="critCpuTempInput" min="1" max="255" placeholder="—">

          <div class="alert-row-label">GPU</div>
          <input type="number" class="alert-num" id="warnGpuTempInput" min="1" max="255" placeholder="—">
          <input type="number" class="alert-num" id="critGpuTempInput" min="1" max="255" placeholder="—">

          <div class="alert-row-label">RAM</div>
          <input type="number" class="alert-num" id="warnRamTempInput" min="1" max="255" placeholder="—">
          <input type="number" class="alert-num" id="critRamTempInput" min="1" max="255" placeholder="—">

          <div class="alert-row-label">Disk</div>
          <input type="number" class="alert-num" id="warnDiskTempInput" min="1" max="255" placeholder="—">
          <input type="number" class="alert-num" id="critDiskTempInput" min="1" max="255" placeholder="—">
        </div>
        <div id="status" class="status" style="margin-top:auto;padding-top:6px;"></div>
      </div>
    </div>

    <!-- Right column: opacity, model name, panel order -->
    <div class="col">
      <div class="card" id="opacityCard">
        <div class="section-label">Opacity</div>
        <div class="slider-row">
          <input type="range" id="slider" min="0" max="100" value="55" step="1">
          <span class="slider-val" id="val">55%</span>
        </div>
        <div class="slider-labels">
          <span>Transparent</span>
          <span>Solid</span>
        </div>
      </div>

      <div class="card" id="appearanceCard">
        <div class="section-label">Appearance</div>
        <label style="font-size:12px;color:var(--text-2);display:block;margin-bottom:4px;">Theme</label>
        <select id="themeSelect">
          <option value="dark-cyan">Dark Cyan (default)</option>
          <option value="amber">Amber</option>
          <option value="green">Green</option>
          <option value="purple">Purple</option>
          <option value="slate">Slate</option>
        </select>
      </div>

      <div class="card panels-card" id="panelsCard">
        <div class="section-label">Panels — drag to reorder</div>
        <div id="panelToggles" class="panel-list"></div>
      </div>
    </div>

  </div>

  <div class="dialog-actions">
    <button class="btn-primary" id="btnSave">Save</button>
    <button id="btnCancel">Cancel</button>
  </div>
</div>

<script type="module" src="./renderer/settings.js"></script>
</body>
</html>
