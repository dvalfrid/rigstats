<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RigStats Settings</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #090c12;
  --panel: rgba(16, 22, 34, 0.94);
  --panel-strong: rgba(10, 16, 28, 0.98);
  --border: rgba(64, 90, 128, 0.3);
  --accent: #00c8ff;
  --good: #39ff88;
  --warn: #ff6b6b;
  --text: #d7e6fb;
  --muted: #89a4ca;
  --mono: Consolas, "SFMono-Regular", monospace;
  --sans: "Segoe UI", sans-serif;
}
body {
  background:
    radial-gradient(circle at top right, rgba(0, 200, 255, 0.14), transparent 24%),
    linear-gradient(180deg, #0b111c 0%, #070a11 100%);
  color: var(--text);
  font-family: var(--sans);
  height: 100vh;
  padding: 10px;
  user-select: none;
  display: flex;
  flex-direction: column;
}
.shell {
  flex: 1;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  background: var(--panel);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 14px 34px rgba(0, 0, 0, 0.36);
}
.hero {
  padding: 9px 12px 8px;
  background: linear-gradient(135deg, rgba(0, 200, 255, 0.16), rgba(7, 12, 20, 0.1));
  border-bottom: 1px solid var(--border);
}
.kicker {
  font: 10px var(--mono);
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 3px;
}
.subtitle {
  color: var(--muted);
  font-size: 11px;
}
.content {
  padding: 8px;
  display: grid;
  grid-template-columns: 0.95fr 1.05fr;
  gap: 7px;
}
.card {
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 9px;
}
.card-span-2 { grid-column: 1 / -1; }
.section-label {
  font: 10px var(--mono);
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.row {
  display: flex;
  align-items: center;
  gap: 8px;
}
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  background: #1e2a40;
  border-radius: 2px;
  cursor: pointer;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #00c8ff;
  cursor: pointer;
  box-shadow: 0 0 4px rgba(0,200,255,0.6);
}
.value {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  width: 34px;
  text-align: right;
  flex-shrink: 0;
}
.labels {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 1px;
}
input[type=text] {
  width: min(100%, 220px);
  background: #141820;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 8px;
  outline: none;
  user-select: text;
  -webkit-app-region: no-drag;
}
input[type=text]:focus { border-color: rgba(0, 200, 255, 0.45); }
select {
  width: 100%;
  background: #141820;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 6px 8px;
  outline: none;
  -webkit-app-region: no-drag;
}
select:focus { border-color: rgba(0, 200, 255, 0.45); }
.actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.dialog-actions {
  margin-top: auto;
  padding: 0 8px 8px;
  display: flex;
  justify-content: flex-end;
}
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #141820;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 6px 8px;
}
.compact-grid {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px;
}
.toggle-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text);
}
.toggle-input {
  width: 14px;
  height: 14px;
  accent-color: #00c8ff;
  cursor: pointer;
}
.panel-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
}
.panel-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  background: #141820;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 5px 6px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1px;
  cursor: pointer;
  user-select: none;
}
.panel-toggle input {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}
.panel-toggle:has(input:checked) {
  color: #001018;
  border-color: transparent;
  background: linear-gradient(180deg, #36d6ff, #00b6e8);
  box-shadow: 0 0 10px rgba(0, 200, 255, 0.25);
}
button {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 10px;
  background: rgba(255,255,255,0.03);
  color: var(--text);
  font: 10px var(--mono);
  letter-spacing: 1px;
  cursor: pointer;
}
button.primary {
  background: var(--accent);
  color: #001018;
  border-color: transparent;
  font-weight: 700;
}
.btn-save {
  background: var(--accent);
  color: #001018;
  border-color: transparent;
  font-weight: 700;
}
.btn-save:hover { background: #33d4ff; }
.btn-cancel {
  background: rgba(255,255,255,0.03);
  color: var(--text);
}
.btn-cancel:hover { border-color: rgba(0, 200, 255, 0.45); }
.status {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1px;
  min-height: 12px;
  color: var(--muted);
  padding: 2px 1px;
}
.status-ok { color: var(--good); }
.status-err { color: var(--warn); }

@media (max-width: 760px) {
  .content {
    grid-template-columns: 1fr;
  }
  .card-span-2 {
    grid-column: auto;
  }
  .compact-grid {
    grid-template-columns: 1fr;
  }
  .panel-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  input[type=text] {
    width: 100%;
  }
}
</style>
</head>
<body>
<div class="shell">
  <div class="hero">
    <div class="kicker">// Settings</div>
    <div class="subtitle">Dashboard preferences and window behavior.</div>
  </div>

  <div class="content">
    <div class="card">
      <div class="section-label">Opacity</div>
      <div class="row">
        <input type="range" id="slider" min="0" max="100" value="55" step="1">
        <span class="value" id="val">55%</span>
      </div>
      <div class="labels">
        <span>TRANSPARENT</span>
        <span>SOLID</span>
      </div>
    </div>

    <div class="card">
      <div class="section-label">Model Name</div>
      <input type="text" id="modelNameInput" maxlength="40" spellcheck="false">
    </div>

    <div class="card card-span-2">
      <div class="section-label">Display & Window</div>
      <div class="compact-grid">
        <select id="profileSelect">
          <option value="portrait-xl">Portrait XL (450x1920)</option>
          <option value="portrait-slim">Portrait Slim (480x1920)</option>
          <option value="portrait-hd">Portrait HD (720x1280)</option>
          <option value="portrait-wxga">Portrait WXGA (800x1280)</option>
          <option value="portrait-fhd">Portrait FHD (1080x1920)</option>
          <option value="portrait-wuxga">Portrait WUXGA (1200x1920)</option>
          <option value="portrait-qhd">Portrait QHD (1440x2560)</option>
          <option value="portrait-hdplus">Portrait HD+ (768x1366)</option>
          <option value="portrait-900x1600">Portrait 900x1600</option>
          <option value="portrait-1050x1680">Portrait 1050x1680</option>
          <option value="portrait-1600x2560">Portrait 1600x2560</option>
          <option value="portrait-4k">Portrait 4K (2160x3840)</option>
        </select>
        <label class="toggle-row" for="alwaysOnTopInput">
          <span class="toggle-label">Always On Top</span>
          <input class="toggle-input" type="checkbox" id="alwaysOnTopInput">
        </label>
      </div>
    </div>

    <div class="card card-span-2">
      <div class="section-label">Visible Panels</div>
      <div id="panelToggles" class="panel-grid"></div>
    </div>

    <div id="status" class="status card-span-2"></div>
  </div>

  <div class="dialog-actions">
    <div class="actions" style="margin-bottom: 0;">
      <button class="btn-save" id="btnSave">Save</button>
      <button class="btn-cancel" id="btnCancel">Cancel</button>
    </div>
  </div>
</div>

<script type="module" src="./renderer/settings.js"></script>
</body>
</html>
