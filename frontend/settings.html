<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RigStats Settings</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #090c12;
  --panel: rgba(16, 22, 34, 0.94);
  --panel-strong: rgba(10, 16, 28, 0.98);
  --border: rgba(64, 90, 128, 0.3);
  --accent: #00c8ff;
  --good: #39ff88;
  --warn: #ff6b6b;
  --text: #d7e6fb;
  --muted: #89a4ca;
  --mono: Consolas, "SFMono-Regular", monospace;
  --sans: "Segoe UI", sans-serif;
}
body {
  background:
    radial-gradient(circle at top right, rgba(0, 200, 255, 0.14), transparent 24%),
    linear-gradient(180deg, #0b111c 0%, #070a11 100%);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 18px;
  user-select: none;
}
.shell {
  border: 1px solid var(--border);
  background: var(--panel);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
}
.hero {
  padding: 18px 20px 14px;
  background: linear-gradient(135deg, rgba(0, 200, 255, 0.16), rgba(7, 12, 20, 0.1));
  border-bottom: 1px solid var(--border);
}
.kicker {
  font: 11px var(--mono);
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.subtitle {
  color: var(--muted);
  font-size: 13px;
}
.content {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.card {
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
}
.section-label {
  font: 11px var(--mono);
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.row {
  display: flex;
  align-items: center;
  gap: 10px;
}
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: #1e2a40;
  border-radius: 2px;
  cursor: pointer;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #00c8ff;
  cursor: pointer;
  box-shadow: 0 0 6px rgba(0,200,255,0.6);
}
.value {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  width: 38px;
  text-align: right;
  flex-shrink: 0;
}
.labels {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
}
input[type=text] {
  width: 100%;
  background: #141820;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  user-select: text;
  -webkit-app-region: no-drag;
}
input[type=text]:focus { border-color: rgba(0, 200, 255, 0.45); }
select {
  width: 100%;
  background: #141820;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  outline: none;
  -webkit-app-region: no-drag;
}
select:focus { border-color: rgba(0, 200, 255, 0.45); }
.actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.dialog-actions {
  padding: 0 16px 16px;
  display: flex;
  justify-content: flex-end;
}
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #141820;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
}
.toggle-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--text);
}
.toggle-input {
  width: 16px;
  height: 16px;
  accent-color: #00c8ff;
  cursor: pointer;
}
button {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 12px;
  background: rgba(255,255,255,0.03);
  color: var(--text);
  font: 11px var(--mono);
  letter-spacing: 1px;
  cursor: pointer;
}
button.primary {
  background: var(--accent);
  color: #001018;
  border-color: transparent;
  font-weight: 700;
}
.btn-save {
  background: var(--accent);
  color: #001018;
  border-color: transparent;
  font-weight: 700;
}
.btn-save:hover { background: #33d4ff; }
.btn-cancel {
  background: rgba(255,255,255,0.03);
  color: var(--text);
}
.btn-cancel:hover { border-color: rgba(0, 200, 255, 0.45); }
.status {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  min-height: 14px;
  color: var(--muted);
}
.status-ok { color: var(--good); }
.status-err { color: var(--warn); }
</style>
</head>
<body>
<div class="shell">
  <div class="hero">
    <div class="kicker">// Settings</div>
    <div class="subtitle">Dashboard preferences and window behavior.</div>
  </div>

  <div class="content">
    <div class="card">
      <div class="section-label">Opacity</div>
      <div class="row">
        <input type="range" id="slider" min="0" max="100" value="55" step="1">
        <span class="value" id="val">55%</span>
      </div>
      <div class="labels">
        <span>TRANSPARENT</span>
        <span>SOLID</span>
      </div>
    </div>

    <div class="card">
      <div class="section-label">Model Name</div>
      <input type="text" id="modelNameInput" maxlength="40" spellcheck="false">
    </div>

    <div class="card">
      <div class="section-label">Display Profile</div>
      <select id="profileSelect">
        <option value="portrait-xl">Portrait XL (450x1920)</option>
        <option value="portrait-slim">Portrait Slim (480x1920)</option>
        <option value="portrait-hd">Portrait HD (720x1280)</option>
        <option value="portrait-wxga">Portrait WXGA (800x1280)</option>
      </select>
    </div>

    <div class="card">
      <div class="section-label">Window</div>
      <label class="toggle-row" for="alwaysOnTopInput">
        <span class="toggle-label">Always On Top</span>
        <input class="toggle-input" type="checkbox" id="alwaysOnTopInput">
      </label>
    </div>

    <div id="status" class="status"></div>
  </div>

  <div class="dialog-actions">
    <div class="actions" style="margin-bottom: 0;">
      <button class="btn-save" id="btnSave">Save</button>
      <button class="btn-cancel" id="btnCancel">Cancel</button>
    </div>
  </div>
</div>

<script type="module" src="./renderer/settings.js"></script>
</body>
</html>
