<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIGStats Status</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #090c12;
  --panel: rgba(16, 22, 34, 0.94);
  --panel-strong: rgba(10, 16, 28, 0.98);
  --border: rgba(64, 90, 128, 0.3);
  --accent: #00c8ff;
  --good: #39ff88;
  --warn: #ff8b5b;
  --text: #d7e6fb;
  --muted: #89a4ca;
  --mono: Consolas, "SFMono-Regular", monospace;
  --sans: "Segoe UI", sans-serif;
}
body {
  background:
    radial-gradient(circle at top right, rgba(0, 200, 255, 0.14), transparent 24%),
    linear-gradient(180deg, #0b111c 0%, #070a11 100%);
  color: var(--text);
  font-family: var(--sans);
  height: 100vh;
  padding: 10px;
  display: flex;
  flex-direction: column;
}
.shell {
  flex: 1;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  background: var(--panel);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 14px 34px rgba(0, 0, 0, 0.36);
}
.hero {
  padding: 10px 12px 8px;
  background: linear-gradient(135deg, rgba(0, 200, 255, 0.16), rgba(7, 12, 20, 0.1));
  border-bottom: 1px solid var(--border);
}
.kicker {
  font: 10px var(--mono);
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.hero-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: flex-start;
}
.title {
  font-size: 24px;
  font-weight: 700;
  line-height: 1;
}
.subtitle {
  margin-top: 4px;
  color: var(--muted);
  font-size: 11px;
}
.content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 8px;
}
.stack {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card {
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px;
}
.card-title {
  font: 10px var(--mono);
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}
.meta-label {
  font: 9px var(--mono);
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 2px;
}
.meta-value {
  font-size: 12px;
  line-height: 1.35;
  word-break: break-word;
}
.meta-value.health-good { color: var(--good); }
.meta-value.health-warn { color: var(--warn); }
.meta-value.health-bad { color: #ff6b6b; }
.meta-value.health-neutral { color: var(--muted); }
.dep-table {
  width: 100%;
  border-collapse: collapse;
}
.dep-table td {
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 6px 0;
  vertical-align: top;
}
.dep-table tr:first-child td { border-top: none; }
.dep-name { font-size: 11px; font-weight: 600; }
.dep-version { font: 10px var(--mono); color: var(--accent); text-align: right; white-space: nowrap; }
.dep-note { font-size: 10px; color: var(--muted); padding-top: 2px; }
.dep-status {
  text-align: right;
  white-space: nowrap;
}
.dep-status-badge {
  display: inline-block;
  min-width: 48px;
  text-align: center;
  padding: 4px 7px;
  border-radius: 999px;
  border: 1px solid var(--border);
  font: 9px var(--mono);
}
.dep-status-badge.ok {
  color: var(--good);
  border-color: rgba(57, 255, 136, 0.28);
  background: rgba(57, 255, 136, 0.08);
}
.dep-status-badge.fail {
  color: #ff6b6b;
  border-color: rgba(255, 107, 107, 0.28);
  background: rgba(255, 107, 107, 0.08);
}
.actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.dialog-actions {
  margin-top: auto;
  padding: 0 8px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
button {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 10px;
  background: rgba(255,255,255,0.03);
  color: var(--text);
  font: 10px var(--mono);
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
}
button:hover { border-color: rgba(0, 200, 255, 0.45); }
button.primary {
  background: var(--accent);
  color: #001018;
  border-color: transparent;
  font-weight: 700;
}
button.primary:hover { background: #66e0ff; border-color: transparent; box-shadow: 0 0 12px rgba(0, 200, 255, 0.5); }
textarea {
  width: 100%;
  height: 160px;
  min-height: 160px;
  resize: none;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #05080d;
  color: #d7e6fb;
  padding: 9px;
  font: 10px/1.4 var(--mono);
  overflow-y: auto;
}
.footer-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 7px;
  margin-top: 7px;
}
.hint {
  color: var(--muted);
  font-size: 9px;
}
@media (max-width: 860px) {
  .content { grid-template-columns: 1fr; }
  .hero-row { flex-direction: column; }
}
</style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="kicker">// Status</div>
      <div class="hero-row">
        <div>
          <span id="rigstatsVersion" style="display:none;">--</span>
          <div class="subtitle">Diagnostics, debug log and dependency health.</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="stack">
        <div class="card">
          <div class="card-title">Diagnostics</div>
          <div class="meta-grid">
            <div>
              <div class="meta-label">Task Name</div>
              <div class="meta-value" id="taskName">--</div>
            </div>
            <div>
              <div class="meta-label">Task Health</div>
              <div class="meta-value health-neutral" id="taskHealth" title="Derived from Windows Task Scheduler state and result code.">--</div>
            </div>
            <div style="grid-column: 1 / -1;">
              <div class="meta-label">Task To Run</div>
              <div class="meta-value" id="taskToRun">--</div>
            </div>
            <div style="grid-column: 1 / -1;">
              <div class="meta-label">Debug Log Path</div>
              <div class="meta-value" id="logPath">--</div>
            </div>
            <div style="grid-column: 1 / -1;">
              <div class="meta-label">Last Successful Refresh</div>
              <div class="meta-value" id="lastSuccessAt">--</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Dependencies</div>
          <table class="dep-table" id="dependenciesTable"></table>
        </div>
      </div>

      <div class="stack">
        <div class="card">
          <div class="card-title">Debug Log</div>
          <div class="actions">
            <button id="copyLogBtn" title="Copy the visible debug log text to the clipboard.">Copy Log</button>
          </div>
          <textarea id="logTail" readonly></textarea>
          <div class="footer-row">
            <div class="hint">Showing the latest log lines from RIGStats backend diagnostics.</div>
            <div id="copyState" class="hint"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="dialog-actions">
      <div class="actions" style="margin-bottom: 0;">
        <button id="collectDiagBtn" title="Collect hardware info, LHM sensor data, debug log and environment details into a ZIP file for bug reports.">Collect Diagnostics…</button>
        <span id="diagState" style="font:9px var(--mono);color:var(--muted);align-self:center;"></span>
      </div>
      <div class="actions" style="margin-bottom: 0;">
        <button class="primary" id="refreshBtn" title="Reload diagnostics and debug log now. Updates Last Successful Refresh when the call succeeds.">Refresh</button>
        <button id="closeBtn" title="Close the Status dialog.">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="./renderer/status.js"></script>
</body>
</html>
