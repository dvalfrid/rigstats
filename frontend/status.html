<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIGStats Status</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="stylesheet" href="./dialog.css">
<style>
/* ── Status-specific layout ─────────────────────────────────────────────── */
.content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
  flex: 1;
  min-height: 0;
}
.stack {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
}
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

/* Dependency table */
.dep-table {
  width: 100%;
  border-collapse: collapse;
}
.dep-table td {
  border-top: 1px solid var(--border);
  padding: 7px 0;
  vertical-align: middle;
}
.dep-table tr:first-child td { border-top: none; }
.dep-name    { font-size: 12px; font-weight: 600; }
.dep-version { font: 11px var(--mono); color: var(--text-2); text-align: right; white-space: nowrap; padding-right: 8px; }
.dep-note    { font-size: 11px; color: var(--text-2); padding-top: 1px; }
.dep-status  { text-align: right; white-space: nowrap; }
.dep-status-badge {
  display: inline-block;
  min-width: 44px;
  text-align: center;
  padding: 3px 7px;
  border-radius: 999px;
  border: 1px solid var(--border);
  font-size: 10px;
  font-weight: 600;
}
.dep-status-badge.ok {
  color: var(--good);
  border-color: rgba(108,203,95,0.3);
  background: rgba(108,203,95,0.08);
}
.dep-status-badge.fail {
  color: var(--bad);
  border-color: rgba(255,100,100,0.3);
  background: rgba(255,100,100,0.08);
}

/* Debug log textarea */
.log-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
textarea {
  flex: 1;
  min-height: 120px;
  resize: none;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  padding: 8px;
  font: 11px/1.45 var(--mono);
  overflow-y: auto;
  user-select: text;
  -webkit-app-region: no-drag;
}
.log-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 7px;
  margin-top: 6px;
  flex-shrink: 0;
}
.hint {
  font-size: 10px;
  color: var(--text-3);
}

/* Left col: diag actions */
.diag-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.diag-state {
  font-size: 11px;
  color: var(--text-2);
}

@media (max-width: 860px) {
  .content { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <span id="rigstatsVersion" style="display:none;">--</span>
      <div class="dialog-title">Status</div>
      <div class="dialog-subtitle">Diagnostics, debug log and dependency health.</div>
    </div>

    <div class="content">
      <div class="stack">
        <div class="card">
          <div class="card-title">Diagnostics</div>
          <div class="meta-grid">
            <div>
              <div class="meta-label">Task Name</div>
              <div class="meta-value" id="taskName">--</div>
            </div>
            <div>
              <div class="meta-label">Task Health</div>
              <div class="meta-value health-neutral" id="taskHealth" title="Derived from Windows Task Scheduler state and result code.">--</div>
            </div>
            <div style="grid-column: 1 / -1;">
              <div class="meta-label">Task To Run</div>
              <div class="meta-value" id="taskToRun">--</div>
            </div>
            <div style="grid-column: 1 / -1;">
              <div class="meta-label">Debug Log Path</div>
              <div class="meta-value" id="logPath">--</div>
            </div>
            <div style="grid-column: 1 / -1;">
              <div class="meta-label">Last Successful Refresh</div>
              <div class="meta-value" id="lastSuccessAt">--</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Dependencies</div>
          <table class="dep-table" id="dependenciesTable"></table>
        </div>
      </div>

      <div class="stack">
        <div class="card log-card">
          <div class="card-title" style="margin-bottom:6px;">Debug Log</div>
          <button id="copyLogBtn" title="Copy the visible debug log text to the clipboard." style="margin-bottom:8px;align-self:flex-start;">Copy Log</button>
          <textarea id="logTail" readonly></textarea>
          <div class="log-footer">
            <div class="hint">Showing latest log lines from RIGStats backend diagnostics.</div>
            <div id="copyState" class="hint"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="dialog-actions" style="justify-content:space-between;">
      <div class="diag-actions">
        <button id="collectDiagBtn" title="Collect hardware info, LHM sensor data, debug log and environment details into a ZIP file for bug reports.">Collect Diagnostics…</button>
        <span id="diagState" class="diag-state"></span>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn-primary" id="refreshBtn" title="Reload diagnostics and debug log now.">Refresh</button>
        <button id="closeBtn" title="Close the Status dialog.">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="./renderer/status.js"></script>
</body>
</html>
