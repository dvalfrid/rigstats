<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Header</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./panel-base.css">
<style>
html, body { width: 450px; height: 212px; }
.update-badge { margin-top: var(--gap-inner-sm); padding: 3px 8px; border: 1px solid rgba(57,255,136,.45); background: rgba(57,255,136,.10); font-family: var(--mono); font-size: var(--font-ui); letter-spacing: 2px; color: #39ff88; text-transform: uppercase; width: max-content; cursor: pointer; line-height: 1.4; }
.update-badge:hover { background: rgba(57,255,136,.2); }
</style>
</head>
<body>
<div class="floating-drag-handle" id="dragHandle"></div>
<div id="ctx-menu">
  <button id="ctxSettings">Settings</button>
  <button id="ctxClose">Close panel</button>
</div>
<div class="panel panel-header" data-panel="header" style="height:196px">
  <div class="tl"></div><div class="br"></div>
  <div class="rig-header-row">
    <div style="min-width:0;overflow:hidden;">
      <div class="rig-label">// GAMING RIG</div>
      <div class="rig-name"><span id="rigName">--</span><span id="modelName">--</span></div>
      <div class="uptime"><span class="dot"></span><span id="uptime">UP 00:00:00</span></div>
      <div id="updateBadge" class="update-badge" style="display:none"></div>
    </div>
    <div class="rig-brand-mark" aria-hidden="true">
      <img id="rigLogo" class="rig-logo" src="./assets/ROG_logo_red.png" alt="ROG">
      <div id="rigBrandText" class="rig-brand-text" style="display:none"></div>
    </div>
  </div>
</div>
<script type="module" src="./renderer/panel-host.js"></script>
</body>
</html>
