<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About RIGStats</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #090c12;
  --panel: rgba(16, 22, 34, 0.94);
  --panel-strong: rgba(10, 16, 28, 0.98);
  --border: rgba(64, 90, 128, 0.3);
  --accent: #00c8ff;
  --good: #39ff88;
  --warn: #ff8b5b;
  --text: #d7e6fb;
  --muted: #89a4ca;
  --mono: Consolas, "SFMono-Regular", monospace;
  --sans: "Segoe UI", sans-serif;
}
body {
  background:
    radial-gradient(circle at top right, rgba(0, 200, 255, 0.14), transparent 24%),
    linear-gradient(180deg, #0b111c 0%, #070a11 100%);
  color: var(--text);
  font-family: var(--sans);
  height: 100vh;
  padding: 10px;
  display: flex;
  flex-direction: column;
}
.shell {
  flex: 1;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  background: var(--panel);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 14px 34px rgba(0, 0, 0, 0.36);
}
.hero {
  padding: 10px 12px 8px;
  background: linear-gradient(135deg, rgba(0, 200, 255, 0.16), rgba(7, 12, 20, 0.1));
  border-bottom: 1px solid var(--border);
}
.kicker {
  font: 10px var(--mono);
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.hero-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: flex-start;
}
.title {
  font-size: 24px;
  font-weight: 700;
  line-height: 1;
}
.subtitle {
  margin-top: 4px;
  color: var(--muted);
  font-size: 11px;
}
.content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto 1fr;
  gap: 8px;
  padding: 8px;
  flex: 1;
  min-height: 0;
}
.stack {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card {
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px;
}
.card-title {
  font: 10px var(--mono);
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}
.meta-label {
  font: 9px var(--mono);
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 2px;
}
.meta-value {
  font-size: 12px;
  line-height: 1.35;
  word-break: break-word;
}
.link-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.link-group {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.link-item {
  color: var(--text);
  text-decoration: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 8px;
  font: 10px var(--mono);
  background: rgba(255,255,255,0.02);
}
.link-item:hover { border-color: rgba(0, 200, 255, 0.45); }
.actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.dialog-actions {
  margin-top: auto;
  padding: 0 8px 8px;
  display: flex;
  justify-content: flex-end;
}
button {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 10px;
  background: rgba(255,255,255,0.03);
  color: var(--text);
  font: 10px var(--mono);
  letter-spacing: 1px;
  cursor: pointer;
}
button.primary {
  background: var(--accent);
  color: #001018;
  border-color: transparent;
  font-weight: 700;
}
.cl-card {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.cl-scroll {
  flex: 1;
  min-height: 0;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #05080d;
  padding: 9px;
  overflow-y: auto;
}
.cl-version {
  margin-bottom: 10px;
}
.cl-version-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 6px;
}
.cl-version-tag {
  font: 700 11px var(--mono);
  color: var(--accent);
  text-decoration: none;
}
a.cl-version-tag:hover { text-decoration: underline; }
.cl-version-date {
  font: 9px var(--mono);
  color: var(--muted);
}
.cl-section-label {
  font: 9px var(--mono);
  letter-spacing: 1px;
  color: var(--muted);
  margin: 4px 0 2px;
}
.cl-items {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.cl-items li {
  font-size: 10px;
  color: var(--text);
  padding: 3px 6px;
  border-radius: 4px;
  background: rgba(255,255,255,0.02);
  border-left: 2px solid var(--border);
  line-height: 1.4;
}
.cl-items li.feat { border-left-color: var(--good); }
.cl-items li.fix  { border-left-color: var(--warn); }
@media (max-width: 860px) {
  .content { grid-template-columns: 1fr; }
  .hero-row { flex-direction: column; }
}
</style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="kicker">// About</div>
      <div class="hero-row">
        <div>
          <div class="title">RIGStats <span id="rigstatsVersion">--</span></div>
          <div class="subtitle">Links, license and contact details.</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="stack">
        <div class="card">
          <div class="card-title">App Details</div>
          <div class="meta-grid">
            <div>
              <div class="meta-label">Version</div>
              <div class="meta-value" id="rigstatsVersionMeta">--</div>
            </div>
            <div>
              <div class="meta-label">License</div>
              <div class="meta-value" id="licenseName">--</div>
            </div>
          </div>
        </div>
      </div>

      <div class="stack">
        <div class="card">
          <div class="card-title">Links</div>
          <div class="link-list">
            <div class="link-group">
              <div class="meta-label">Website</div>
              <a class="link-item" href="#" id="websiteLink">https://rigstats.app</a>
            </div>
            <div class="link-group">
              <div class="meta-label">Contact</div>
              <a id="emailLink" class="link-item" href="#">--</a>
            </div>
          </div>
        </div>
      </div>
      <div class="card cl-card">
        <div class="card-title">What's New</div>
        <div class="cl-scroll" id="changelogContent"></div>
      </div>
    </div>

    <div class="dialog-actions">
      <div class="actions" style="margin-bottom: 0;">
        <button class="primary" id="refreshBtn" title="Reload app version, license and contact information from the backend.">Refresh</button>
        <button id="closeBtn" title="Close the About dialog.">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="./renderer/about.js"></script>
</body>
</html>
