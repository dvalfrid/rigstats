<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About RIGStats</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="stylesheet" href="./dialog.css">
<style>
/* ── About-specific layout ──────────────────────────────────────────────── */
.content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
  flex: 1;
  min-height: 0;
  align-content: start;
}
.stack {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.hero-title {
  font-size: 24px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 2px;
}
.link-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.link-group {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.link-item {
  color: var(--text);
  text-decoration: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 7px 10px;
  font-size: 12px;
  background: var(--bg);
  display: block;
  transition: border-color 0.1s;
}
.link-item:hover { border-color: var(--border-hi); }
@media (max-width: 860px) {
  .content { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="hero-title">RIGStats</div>
      <div class="dialog-subtitle">Links, license and contact details.</div>
    </div>

    <div class="content">
      <div class="stack">
        <div class="card">
          <div class="card-title">App Details</div>
          <div class="meta-grid">
            <div>
              <div class="meta-label">Version</div>
              <div class="meta-value" id="rigstatsVersionMeta">--</div>
            </div>
            <div>
              <div class="meta-label">License</div>
              <div class="meta-value" id="licenseName">--</div>
            </div>
          </div>
        </div>
      </div>

      <div class="stack">
        <div class="card">
          <div class="card-title">Links</div>
          <div class="link-list">
            <div class="link-group">
              <div class="meta-label">Website</div>
              <a class="link-item" href="#" id="websiteLink">https://rigstats.app</a>
            </div>
            <div class="link-group">
              <div class="meta-label">Contact</div>
              <a id="emailLink" class="link-item" href="#">--</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="dialog-actions">
      <button class="btn-primary" id="refreshBtn" title="Reload app version, license and contact information from the backend.">Refresh</button>
      <button id="closeBtn" title="Close the About dialog.">Close</button>
    </div>
  </div>

  <script type="module" src="./renderer/about.js"></script>
</body>
</html>
