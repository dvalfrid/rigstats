<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Processes</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./panel-base.css">
<style>
html, body { width: 450px; height: 276px; }
</style>
</head>
<body>
<div class="floating-drag-handle" id="dragHandle"></div>
<div id="ctx-menu">
  <button id="ctxSettings">Settings</button>
  <button id="ctxClose">Close panel</button>
</div>
<div class="panel panel-proc" data-panel="process" style="height:260px">
  <div class="tl"></div><div class="br"></div>
  <div class="stat-label">PROCESSES</div>
  <div class="proc-header">
    <span>NAME</span>
    <span class="proc-header-cpu">CPU</span>
    <span class="proc-header-ram">RAM</span>
  </div>
  <div id="procList"></div>
</div>
<script type="module" src="./renderer/panel-host.js"></script>
</body>
</html>
