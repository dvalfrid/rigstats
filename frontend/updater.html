<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIGStats Update</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="stylesheet" href="./dialog.css">
<style>
/* ── Updater-specific layout ────────────────────────────────────────────── */
.version-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-2);
}
.version-new {
  color: var(--good);
  font-weight: 700;
}

.body {
  flex: 1;
  padding: 10px 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
}
.cl-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
}
.cl-scroll {
  flex: 1;
  min-height: 0;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--bg);
  padding: 10px;
  overflow-y: auto;
}
.cl-version { margin-bottom: 10px; }
.cl-version-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 6px;
}
.cl-version-tag {
  font: 700 12px var(--mono);
  color: var(--accent);
  text-decoration: none;
}
a.cl-version-tag:hover { text-decoration: underline; }
.cl-version-date { font: 10px var(--mono); color: var(--text-2); }
.cl-section-label {
  font-size: 10px;
  color: var(--text-3);
  margin: 4px 0 2px;
}
.cl-items {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.cl-items li {
  font-size: 11px;
  color: var(--text);
  padding: 3px 8px;
  border-radius: var(--radius);
  background: rgba(255,255,255,0.03);
  border-left: 2px solid var(--border);
  line-height: 1.4;
}
.cl-items li.feat { border-left-color: var(--good); }
.cl-items li.fix  { border-left-color: var(--warn); }
.cl-empty {
  font-size: 12px;
  color: var(--text-2);
  padding: 6px 0;
}

/* Progress */
.progress-wrap {
  display: none;
  flex-direction: column;
  gap: 6px;
}
.progress-wrap.visible { display: flex; }
.progress-label {
  font-size: 11px;
  color: var(--text-2);
}
.progress-track {
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s ease;
}

.status-msg {
  font-size: 11px;
  color: var(--text-2);
  padding: 0 12px 8px;
  min-height: 18px;
}
</style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="dialog-title" id="heroTitle">Update Available</div>
      <div class="version-row" id="versionRow">
        <span id="currentVersion">--</span>
        <span>→</span>
        <span class="version-new" id="newVersion">--</span>
      </div>
    </div>

    <div class="body">
      <div class="cl-label">What's New</div>
      <div class="cl-scroll" id="changelogContent"></div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-label" id="progressLabel">Downloading…</div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <div class="dialog-actions">
      <button id="updateBtn" class="btn-primary">Update Now</button>
      <button id="laterBtn">Close</button>
    </div>
  </div>

  <script type="module" src="./renderer/updater.js"></script>
</body>
</html>
