name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build and attach installers to (for example v1.0.0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  release:
    name: Build And Publish Release (Windows)
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Run verification
        run: npm run verify

      - name: Build installer
        run: npm run build

      - name: Sign installer
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://neu.codesigning.azure.net/
          trusted-signing-account-name: rigstats-codesign
          certificate-profile-name: RIGStats
          files-folder: src-tauri/target/release/bundle/nsis
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign update bundle (Tauri updater signature)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $exePath = (Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1).FullName
          npx @tauri-apps/cli signer sign -k "$env:TAURI_SIGNING_PRIVATE_KEY" -p "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" $exePath

      - name: Generate latest.json update manifest
        shell: pwsh
        run: |
          $exePath = (Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1).FullName
          $sigPath  = "$exePath.sig"
          $sig      = (Get-Content $sigPath -Raw).Trim()
          $version  = ($env:RELEASE_TAG -replace '^v', '')
          $basename = Split-Path $exePath -Leaf
          $pubDate  = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")
          $repoUrl  = "https://github.com/dvalfrid/rigstats"

          $manifest = [ordered]@{
            version  = $version
            notes    = "See the full changelog at ${repoUrl}/releases/tag/$env:RELEASE_TAG"
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "${repoUrl}/releases/download/$env:RELEASE_TAG/${basename}"
              }
            }
          } | ConvertTo-Json -Depth 5

          $manifest | Out-File "latest.json" -Encoding UTF8NoBOM
          Write-Host "Generated latest.json for v$version"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            latest.json
