<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0b0d12;
  color: #b8cce8;
  font-family: 'Segoe UI', sans-serif;
  padding: 16px 20px 14px;
  border: 1px solid #1e2a40;
  user-select: none;
}
.title {
  font-family: monospace;
  font-size: 10px;
  color: #00c8ff;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.section-label {
  font-family: monospace;
  font-size: 9px;
  color: #6f8db7;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.row {
  display: flex;
  align-items: center;
  gap: 10px;
}
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: #1e2a40;
  border-radius: 2px;
  cursor: pointer;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #00c8ff;
  cursor: pointer;
  box-shadow: 0 0 6px rgba(0,200,255,0.6);
}
.value {
  font-family: monospace;
  font-size: 13px;
  color: #fff;
  width: 38px;
  text-align: right;
  flex-shrink: 0;
}
.labels {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  margin-bottom: 16px;
  font-size: 9px;
  color: #6f8db7;
  letter-spacing: 1px;
}
input[type=text] {
  width: 100%;
  background: #141820;
  border: 1px solid #1e2a40;
  border-radius: 4px;
  color: #fff;
  font-family: monospace;
  font-size: 13px;
  padding: 6px 8px;
  outline: none;
  margin-bottom: 16px;
  user-select: text;
  -webkit-app-region: no-drag;
}
input[type=text]:focus { border-color: #00c8ff; }
.btn-row {
  display: flex;
  gap: 8px;
}
button {
  flex: 1;
  padding: 7px 0;
  border: none;
  border-radius: 4px;
  font-family: monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
}
.btn-save { background: #00c8ff; color: #000; font-weight: 700; }
.btn-save:hover { background: #33d4ff; }
.btn-cancel { background: #1e2a40; color: #b8cce8; }
.btn-cancel:hover { background: #263450; }
</style>
</head>
<body>
<div class="title">// Config</div>

<div class="section-label">Opacity</div>
<div class="row">
  <input type="range" id="slider" min="0" max="100" value="55" step="1">
  <span class="value" id="val">55%</span>
</div>
<div class="labels">
  <span>TRANSPARENT</span>
  <span>SOLID</span>
</div>

<div class="section-label">Model Name</div>
<input type="text" id="modelNameInput" maxlength="40" spellcheck="false">

<div class="btn-row">
  <button class="btn-save" id="btnSave">Save</button>
  <button class="btn-cancel" id="btnCancel">Cancel</button>
</div>

<script>
function resolveBackend() {
  try {
    if (window.require) {
      const ipcRenderer = window.require('electron').ipcRenderer;
      return {
        invoke: (channel, payload = {}) => ipcRenderer.invoke(channel, payload)
      };
    }
  } catch (_e) {}

  const tauriGlobal = window.__TAURI__ || null;
  const tauriInvoke = tauriGlobal ? (tauriGlobal.invoke || tauriGlobal.tauri?.invoke) : null;
  if (typeof tauriInvoke === 'function') {
    return {
      invoke: (channel, payload = {}) => tauriInvoke(String(channel).replace(/-/g, '_'), payload)
    };
  }

  return null;
}

const backend = resolveBackend();
const slider = document.getElementById('slider');
const val = document.getElementById('val');
const modelNameInput = document.getElementById('modelNameInput');
let original = { opacity: 0.55, modelName: '' };
let isSaving = false;

if (backend) {
backend.invoke('get-settings').then(s => {
  original = { opacity: s.opacity ?? 0.55, modelName: s.modelName ?? '' };
  const pct = Math.round(original.opacity * 100);
  slider.value = pct;
  val.textContent = pct + '%';
  modelNameInput.value = original.modelName;
});
}

slider.addEventListener('input', () => {
  const pct = parseInt(slider.value, 10);
  val.textContent = pct + '%';
  if (backend) backend.invoke('preview-opacity', { value: pct / 100 });
});

document.getElementById('btnSave').addEventListener('click', async () => {
  if (!backend || isSaving) return;

  isSaving = true;
  const opacity = parseInt(slider.value, 10) / 100;
  const modelName = modelNameInput.value.trim();

  try {
    await backend.invoke('save-settings', {
      opacity,
      model_name: modelName
    });

    // If a late cancel/escape handler fires, keep the saved value.
    original = { opacity, modelName };
  } catch (err) {
    console.error('save-settings failed:', err);
  } finally {
    await backend.invoke('close-window');
  }
});

document.getElementById('btnCancel').addEventListener('click', async () => {
  if (!backend || isSaving) return;
  await backend.invoke('preview-opacity', { value: original.opacity });
  await backend.invoke('close-window');
});

document.addEventListener('keydown', async e => {
  if (e.key === 'Escape') {
    if (!backend || isSaving) return;
    await backend.invoke('preview-opacity', { value: original.opacity });
    await backend.invoke('close-window');
  }
});
</script>
</body>
</html>
